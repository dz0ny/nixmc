name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

# Signs with a Developer ID cert, notarizes, staples, and attaches the DMG
# to the GitHub Release. Requires these repository secrets:
#   MACOS_CERT_P12        base64 of your "Developer ID Application" .p12
#   MACOS_CERT_PASSWORD   password for that .p12
#   MACOS_SIGN_ID         e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_ID              Apple ID email
#   APPLE_TEAM_ID         10-char team id
#   APPLE_APP_PASSWORD    app-specific password for notarytool
jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import signing certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          KEYCHAIN_PW=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          rm cert.p12

      - name: Build, sign, notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_PW: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          # Derive the bundle version from the release tag (strip a leading "v").
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          VERSION="${VERSION:-0.0.0}"
          make release VERSION="$VERSION" SIGN_ID="${{ secrets.MACOS_SIGN_ID }}"

      - name: Attach DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/nixmc.dmg
